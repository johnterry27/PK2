<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistem Pakar - Pink Cute Slider Edition</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary: #ff7eb3; /* Pink terang utama */
        --secondary: #ff529a; /* Pink gelap untuk hover */
        --bg-color: #fff0f5; /* Background pink sangat muda */
        --text-dark: #5a4b52; /* Warna teks agar mudah dibaca */
        --danger: #ff4757; /* Merah untuk Tifus */
        --success: #2ed573; /* Hijau untuk Aman */
      }

      body {
        font-family: "Nunito", sans-serif;
        background-color: var(--bg-color);
        /* Motif Polkadot Pink seperti di gambar */
        background-image: radial-gradient(#ffb6c1 2px, transparent 2px);
        background-size: 30px 30px;
        color: var(--text-dark);
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        box-sizing: border-box;
      }

      .main-container {
        display: flex;
        flex-direction: row;
        background: #ffffff; /* Kotak utama warna putih bersih */
        border-radius: 25px; /* Ujung membulat */
        border: 4px solid #ffe4ed; /* Garis tepi pink muda */
        box-shadow: 0 15px 35px rgba(255, 126, 179, 0.2);
        overflow: hidden;
        width: 1000px;
        max-width: 100%;
      }

      .input-section {
        padding: 40px;
        width: 50%;
        box-sizing: border-box;
        border-right: 2px dashed #ffb6c1; /* Garis putus-putus lucu pemisah tengah */
      }

      .result-section {
        padding: 40px;
        width: 50%;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        background-color: #fffafc;
      }

      h2 {
        color: var(--primary);
        text-align: center;
        margin-top: 0;
        font-weight: 800;
        font-size: 28px;
        text-shadow: 2px 2px 0px #ffe4ed;
      }

      .subtitle {
        text-align: center;
        color: #998b92;
        margin-bottom: 30px;
        font-size: 14px;
        font-weight: 700;
      }

      .form-group {
        margin-bottom: 22px;
      }

      .label-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }

      label {
        font-weight: 800;
        color: var(--text-dark);
        font-size: 15px;
      }

      /* Tampilan angka di sebelah kanan slider */
      .value-display {
        font-weight: 800;
        color: var(--primary);
        background: #ffe4ed;
        padding: 4px 12px;
        border-radius: 12px;
        font-size: 14px;
      }

      /* --- DESAIN SLIDER IMUT --- */
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 10px;
        background: #ffe4ed; /* Jalur slider pink pucat */
        border-radius: 10px;
        outline: none;
        transition: all 0.3s ease;
      }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: var(--primary); /* Tombol pink terang */
        border: 3px solid #ffffff; /* Garis putih di tombol */
        cursor: pointer;
        box-shadow: 0 3px 8px rgba(255, 126, 179, 0.4);
        transition: transform 0.2s ease;
      }

      input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.2);
        background: var(--secondary);
      }

      button {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        color: white;
        border: none;
        border-radius: 15px;
        font-size: 18px;
        font-family: "Nunito", sans-serif;
        font-weight: 800;
        cursor: pointer;
        margin-top: 15px;
        box-shadow: 0 5px 15px rgba(255, 82, 154, 0.4);
        transition: all 0.3s ease;
      }

      button:hover {
        transform: translateY(-3px) scale(1.02);
        box-shadow: 0 8px 20px rgba(255, 82, 154, 0.5);
      }

      /* --- VISUAL HASIL --- */
      .visual-container {
        display: none;
        width: 100%;
        animation: fadeIn 0.8s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.9);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .nurse-image {
        width: 220px;
        height: 220px;
        border-radius: 50%;
        object-fit: cover;
        object-position: top;
        border: 8px solid white;
        box-shadow: 0 10px 25px rgba(255, 126, 179, 0.3);
        margin-bottom: 20px;
        /* Animasi naik turun pelan */
        animation: float 3s ease-in-out infinite;
      }

      @keyframes float {
        0% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-10px);
        }
        100% {
          transform: translateY(0px);
        }
      }

      .status-badge {
        display: inline-block;
        padding: 10px 25px;
        border-radius: 50px;
        color: white;
        font-weight: 800;
        font-size: 18px;
        margin-bottom: 20px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      /* --- DESAIN PROGRESS BAR --- */
      .progress-container {
        width: 100%;
        background: #ffe4ed;
        border-radius: 15px;
        height: 28px;
        position: relative;
        overflow: hidden;
        margin-bottom: 10px;
        box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.05);
      }

      .progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--primary), var(--secondary));
        border-radius: 15px;
        transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .progress-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 14px;
        font-weight: 800;
        color: var(--text-dark);
      }

      .placeholder-text {
        color: #ff9cbd;
        font-weight: bold;
      }

      @media (max-width: 768px) {
        .main-container {
          flex-direction: column;
        }
        .input-section,
        .result-section {
          width: 100%;
          border-right: none;
          padding: 30px 20px;
        }
        .input-section {
          border-bottom: 2px dashed #ffb6c1;
        }
      }
    </style>
  </head>
  <body>
    <div class="main-container">
      <div class="input-section">
        <h2>💖 Pakar Tifus 💖</h2>
        <p class="subtitle">Geser tombol untuk mengatur nilai ya!</p>

        <div class="form-group">
          <div class="label-container">
            <label>🌡️ 1. Demam Tinggi (Aturan 1)</label>
            <span class="value-display" id="valDemam">0.9</span>
          </div>
          <input
            type="range"
            id="demam"
            min="0"
            max="1"
            step="0.1"
            value="0.9"
            oninput="updateVal('demam', 'valDemam')"
          />
        </div>

        <div class="form-group">
          <div class="label-container">
            <label>😣 2. Sakit Perut (Aturan 1)</label>
            <span class="value-display" id="valSakitPerut">0.6</span>
          </div>
          <input
            type="range"
            id="sakitPerut"
            min="0"
            max="1"
            step="0.1"
            value="0.6"
            oninput="updateVal('sakitPerut', 'valSakitPerut')"
          />
        </div>

        <hr
          style="border: none; border-top: 2px dashed #ffe4ed; margin: 25px 0"
        />

        <div class="form-group">
          <div class="label-container">
            <label>🥱 3. Lemas (Aturan 2)</label>
            <span class="value-display" id="valLemas">0.7</span>
          </div>
          <input
            type="range"
            id="lemas"
            min="0"
            max="1"
            step="0.1"
            value="0.7"
            oninput="updateVal('lemas', 'valLemas')"
          />
        </div>

        <div class="form-group">
          <div class="label-container">
            <label>🤢 4. Mual (Aturan 2)</label>
            <span class="value-display" id="valMual">0.8</span>
          </div>
          <input
            type="range"
            id="mual"
            min="0"
            max="1"
            step="0.1"
            value="0.8"
            oninput="updateVal('mual', 'valMual')"
          />
        </div>

        <div class="form-group">
          <div class="label-container">
            <label>🍽️ 5. Nafsu Makan (Aturan 2)</label>
            <span class="value-display" id="valNafsuMakan">0.6</span>
          </div>
          <input
            type="range"
            id="nafsuMakan"
            min="0"
            max="1"
            step="0.1"
            value="0.6"
            oninput="updateVal('nafsuMakan', 'valNafsuMakan')"
          />
        </div>

        <button onclick="hitungCFVisual()">✨ Mulai Diagnosis ✨</button>
      </div>

      <div class="result-section" id="resultSection">
        <div class="placeholder-text" id="placeholder">
          <h3 style="font-size: 22px">Belum ada hasil... 🌸</h3>
          <p style="color: #998b92">
            Silakan atur slider di samping dan tekan tombol.
          </p>
        </div>

        <div class="visual-container" id="visualContainer">
          <img src="" alt="Status Suster" class="nurse-image" id="nurseImg" />

          <div id="statusBadgeContainer">
            <span class="status-badge" id="statusText"></span>
          </div>

          <div style="width: 100%; max-width: 280px; margin: 0 auto">
            <label
              style="
                display: block;
                text-align: left;
                margin-bottom: 8px;
                font-size: 13px;
                color: #998b92;
              "
              >Tingkat Keyakinan Sistem (CF)</label
            >
            <div class="progress-container">
              <div class="progress-fill" id="progressFill"></div>
              <span class="progress-text" id="progressText">0%</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Link Gambar (Silakan ganti dengan file lokal kamu jika sudah ada)
      const URL_SEDIH = "sedih.jpg";
      const URL_SENYUM = "senyum.jpg";

      // Fungsi update angka realtime saat slider digeser
      function updateVal(inputId, displayId) {
        let val = document.getElementById(inputId).value;
        document.getElementById(displayId).innerText =
          parseFloat(val).toFixed(1);
      }

      function hitungCFVisual() {
        let demam = parseFloat(document.getElementById("demam").value);
        let sakitPerut = parseFloat(
          document.getElementById("sakitPerut").value,
        );
        let lemas = parseFloat(document.getElementById("lemas").value);
        let mual = parseFloat(document.getElementById("mual").value);
        let nafsuMakan = parseFloat(
          document.getElementById("nafsuMakan").value,
        );

        // Rumus Sistem Pakar
        let cf1 = Math.min(demam, sakitPerut) * 0.8;
        let cf2 = Math.min(lemas, mual, nafsuMakan) * 0.7;
        let cfGabung = cf1 + cf2 * (1 - cf1);
        let persentase = (cfGabung * 100).toFixed(2);

        document.getElementById("placeholder").style.display = "none";
        document.getElementById("visualContainer").style.display = "block";

        const nurseImg = document.getElementById("nurseImg");
        const statusText = document.getElementById("statusText");
        const progressFill = document.getElementById("progressFill");
        const progressText = document.getElementById("progressText");

        // Reset lebar bar animasi
        progressFill.style.width = "0%";

        setTimeout(() => {
          progressFill.style.width = persentase + "%";
          progressText.innerText =
            persentase + "% (CF: " + cfGabung.toFixed(4) + ")";

          // Logika Ambang Batas 80%
          if (cfGabung >= 0.8) {
            nurseImg.src = URL_SEDIH;
            nurseImg.style.borderColor = "#ff4757"; // Border gambar jadi merah
            statusText.innerText = "😭 TERKENA TIFUS";
            statusText.style.backgroundColor = "#ff4757";
            progressFill.style.background =
              "linear-gradient(90deg, #ff6b81, #ff4757)";
          } else {
            nurseImg.src = URL_SENYUM;
            nurseImg.style.borderColor = "#2ed573"; // Border gambar jadi hijau
            statusText.innerText = "✨ AMAN DARI TIFUS ✨";
            statusText.style.backgroundColor = "#2ed573";
            progressFill.style.background =
              "linear-gradient(90deg, #7bed9f, #2ed573)";
          }
        }, 150);
      }
    </script>
  </body>
</html>
